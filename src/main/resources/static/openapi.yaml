openapi: 3.0.0
info:
  title: CIBUS API Sistema de Gestión de Servicios Gastronómicos
  version: 1.0.0
  description: >
    Documentación de la API REST para el sistema de gestión de servicios gastronómicos CIBUS.
servers:
  - url: http://localhost:8080/api
    description: Servidor local de desarrollo

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Autenticación de usuarios
  - name: Branches
    description: Gestión de sucursales 
  - name: Users
    description: Gestión de empleados 
  - name: Products
    description: Gestión de productos del menú 
  - name: Tables
    description: Gestión de mesas 
  - name: Orders
    description: Gestión de pedidos 
  - name: Order Details
    description: Gestión de detalles de pedidos
  - name: Statistics
    description: Estadísticas

paths:

  # ── AUTH ──────────────────────────────────────────────────────────────────

  /auth:
    post:
      tags:
        - Auth
      summary: Authenticate user
      description: Authenticates a user and returns an access token and a refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token
      description: Generates a new access token using a valid refresh token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid or expired refresh token

  # ── BRANCHES ──────────────────────────────────────────────────────────────

  /branches:
    get:
      tags:
        - Branches
      summary: Get all branches
      description: Returns a list of all branches.
      responses:
        '200':
          description: Branches retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BranchResponseDTO'

    post:
      tags:
        - Branches
      summary: Create a branch
      description: Creates a new branch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchRequestDTO'
      responses:
        '201':
          description: Branch created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponseDTO'

  /branches/{branchId}:
    get:
      tags:
        - Branches
      summary: Get branch by ID
      description: Returns a branch by its ID.
      parameters:
        - $ref: '#/components/parameters/branchId'
      responses:
        '200':
          description: Branch found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponseDTO'

    put:
      tags:
        - Branches
      summary: Update a branch
      description: Updates an existing branch.
      parameters:
        - $ref: '#/components/parameters/branchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchRequestDTO'
      responses:
        '200':
          description: Branch updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponseDTO'

    delete:
      tags:
        - Branches
      summary: Delete a branch
      description: Deletes a branch by its ID.
      parameters:
        - $ref: '#/components/parameters/branchId'
      responses:
        '204':
          description: Branch deleted successfully

  /branches/search:
    get:
      tags:
        - Branches
      summary: Search branch by address
      description: Returns a branch matching the provided street and number.
      parameters:
        - name: street
          in: query
          required: true
          schema:
            type: string
        - name: number
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Branch found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BranchResponseDTO'

   # ── PRODUCTS ──────────────────────────────────────────────────────────────

  /products:
    get:
      tags:
        - Products
      summary: Get products
      description: Returns a paginated list of products.
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: categoryName
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponseDTO'

    post:
      tags:
        - Products
      summary: Create product
      description: Creates a new product.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequestDTO'
      responses:
        '201':
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponseDTO'

  /products/{productId}:
    get:
      tags:
        - Products
      summary: Get product by ID
      parameters:
        - $ref: '#/components/parameters/productId'
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponseDTO'

    put:
      tags:
        - Products
      summary: Update product
      parameters:
        - $ref: '#/components/parameters/productId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequestDTO'
      responses:
        '200':
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponseDTO'

    delete:
      tags:
        - Products
      summary: Delete product
      parameters:
        - $ref: '#/components/parameters/productId'
      responses:
        '204':
          description: Product deleted successfully

  /products/categories:
    get:
      tags:
        - Products
      summary: Get product categories
      description: Returns the names of all product categories.
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ── PRODUCT CATEGORIES ─────────────────────────────────────────────────────────────────        

  /product-categories:
    get:
      tags:
        - Product Categories
      summary: Get all product categories
      description: Returns a list of all product categories.
      responses:
        '200':
          description: Categories retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCategoryResponseDTO'

    post:
      tags:
        - Product Categories
      summary: Create product category
      description: Creates a new product category.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCategoryRequestDTO'
      responses:
        '201':
          description: Product category created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCategoryResponseDTO'

  /product-categories/{productCategoryId}:
    get:
      tags:
        - Product Categories
      summary: Get product category by ID
      parameters:
        - $ref: '#/components/parameters/productCategoryId'
      responses:
        '200':
          description: Product category found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCategoryResponseDTO'

    put:
      tags:
        - Product Categories
      summary: Update product category
      parameters:
        - $ref: '#/components/parameters/productCategoryId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCategoryRequestDTO'
      responses:
        '200':
          description: Product category updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCategoryResponseDTO'

    delete:
      tags:
        - Product Categories
      summary: Delete product category
      parameters:
        - $ref: '#/components/parameters/productCategoryId'
      responses:
        '204':
          description: Product category deleted successfully

  /product-categories/name/{name}:
    get:
      tags:
        - Product Categories
      summary: Get product category by name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product category found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCategoryResponseDTO'


  # ── BRANCH PRODUCTS ────────────────────────────────────────────────────────────

  /branches/{branchId}/products:
    get:
      tags:
        - Branch Products
      summary: Get branch products
      description: Returns a paginated list of products available in a branch.
      parameters:
        - $ref: '#/components/parameters/branchId'
        - name: productId
          in: query
          schema:
            type: integer
        - name: productName
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: available
          in: query
          schema:
            type: boolean
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Products retrieved successfully

    post:
      tags:
        - Branch Products
      summary: Add product to branch
      description: Associates a product with a branch.
      parameters:
        - $ref: '#/components/parameters/branchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchProductRequestDTO'
      responses:
        '201':
          description: Product added successfully

  /branches/{branchId}/products/{productId}:
    get:
      tags:
        - Branch Products
      summary: Get branch product
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/productId'
      responses:
        '200':
          description: Product found

    put:
      tags:
        - Branch Products
      summary: Update branch product
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/productId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BranchProductUpdateDTO'
      responses:
        '200':
          description: Product updated successfully

    delete:
      tags:
        - Branch Products
      summary: Delete branch product
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/productId'
      responses:
        '204':
          description: Product removed successfully

  # ── USERS ─────────────────────────────────────────────────────────────────

  /users:
    get:
      tags:
        - Users
      summary: Get users
      description: Returns a paginated list of users.
      parameters:
        - name: dni
          in: query
          schema:
            type: integer
        - name: name
          in: query
          schema:
            type: string
        - name: phoneNumber
          in: query
          schema:
            type: string
        - name: email
          in: query
          schema:
            type: string
        - name: branchId
          in: query
          schema:
            type: integer
        - name: userRoleId
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDTO'

    post:
      tags:
        - Users
      summary: Create user
      description: Creates a new user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequestDTO'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDTO'

  /users/{userId}:
    get:
      tags:
        - Users
      summary: Get user by ID
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDTO'

    put:
      tags:
        - Users
      summary: Update user
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateDTO'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDTO'

    delete:
      tags:
        - Users
      summary: Delete user
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: User deleted successfully

  /users/{userId}/change-password:
    put:
      tags:
        - Users
      summary: Change user password
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequestDTO'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDTO'

  /users/{userId}/change-role:
    put:
      tags:
        - Users
      summary: Change user role
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeRoleDTO'
      responses:
        '200':
          description: Role changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDTO'

  /users/{userId}/reset-pin:
    patch:
      tags:
        - Users
      summary: Reset user PIN
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPinRequestDTO'
      responses:
        '200':
          description: PIN reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseDTO'

  /users/roles:
    get:
      tags:
        - Users
      summary: Get available user roles
      responses:
        '200':
          description: Roles retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ── TABLES ────────────────────────────────────────────────────────────────

  /branches/{branchId}/tables:
    get:
      tags:
        - Tables
      summary: Get branch tables
      description: Returns a paginated list of tables belonging to a branch.
      parameters:
        - $ref: '#/components/parameters/branchId'
        - name: tableNumber
          in: query
          schema:
            type: integer
        - name: capacity
          in: query
          schema:
            type: integer
        - name: available
          in: query
          schema:
            type: boolean
        - name: waiterId
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Tables retrieved successfully

    post:
      tags:
        - Tables
      summary: Create table
      description: Creates a new table in the specified branch.
      parameters:
        - $ref: '#/components/parameters/branchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableCreateDTO'
      responses:
        '201':
          description: Table created successfully

  /branches/{branchId}/tables/{tableNumber}:
    get:
      tags:
        - Tables
      summary: Get table by number
      parameters:
        - $ref: '#/components/parameters/branchId'
        - name: tableNumber
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Table found

    put:
      tags:
        - Tables
      summary: Update table
      parameters:
        - $ref: '#/components/parameters/branchId'
        - name: tableNumber
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableUpdateDTO'
      responses:
        '200':
          description: Table updated successfully

    delete:
      tags:
        - Tables
      summary: Delete table
      parameters:
        - $ref: '#/components/parameters/branchId'
        - name: tableNumber
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Table deleted successfully

  /branches/{branchId}/tables/occupy/{tableNumber}:
    patch:
      tags:
        - Tables
      summary: Occupy table
      description: Assigns a waiter and marks the table as occupied.
      parameters:
        - $ref: '#/components/parameters/branchId'
        - name: tableNumber
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TableUpdateDTO'
      responses:
        '200':
          description: Table occupied successfully

  /branches/{branchId}/tables/free/{tableNumber}:
    patch:
      tags:
        - Tables
      summary: Free table
      description: Marks the table as available.
      parameters:
        - $ref: '#/components/parameters/branchId'
        - name: tableNumber
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Table freed successfully

  # ── ORDERS ────────────────────────────────────────────────────────────────

  /branches/{branchId}/orders:
    get:
      tags:
        - Orders
      summary: Get orders
      description: Returns a paginated list of orders for a branch.
      parameters:
        - $ref: '#/components/parameters/branchId'
        - name: tableNumber
          in: query
          schema:
            type: integer
        - name: waiterId
          in: query
          schema:
            type: integer
        - name: statusName
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: minTotal
          in: query
          schema:
            type: number
        - name: maxTotal
          in: query
          schema:
            type: number
      responses:
        '200':
          description: Orders retrieved successfully

    post:
      tags:
        - Orders
      summary: Create order
      parameters:
        - $ref: '#/components/parameters/branchId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderRequestDTO'
      responses:
        '201':
          description: Order created successfully

  /branches/{branchId}/orders/{orderId}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
      responses:
        '200':
          description: Order found

    put:
      tags:
        - Orders
      summary: Update order
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdateDTO'
      responses:
        '200':
          description: Order updated successfully

  /branches/{branchId}/orders/{orderId}/payments:
    post:
      tags:
        - Orders
      summary: Add payment to order
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentDTO'
      responses:
        '201':
          description: Payment added successfully

  /branches/{branchId}/orders/{orderId}/discount:
    patch:
      tags:
        - Orders
      summary: Apply discount to order
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscountRequestDTO'
      responses:
        '200':
          description: Discount applied successfully

  /branches/{branchId}/orders/statuses:
    get:
      tags:
        - Orders
      summary: Get order statuses
      parameters:
      - $ref: '#/components/parameters/branchId'
      responses:
        '200':
          description: Status list retrieved successfully

  /branches/{branchId}/orders/{orderId}/cancel:
    post:
      tags:
        - Orders
      summary: Cancel order
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
      responses:
        '200':
          description: Order cancelled successfully

  /branches/{branchId}/orders/{orderId}/ready:
    post:
      tags:
        - Orders
      summary: Mark order as ready
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
      responses:
        '200':
          description: Order marked as ready

  /branches/{branchId}/orders/{orderId}/serve:
    post:
      tags:
        - Orders
      summary: Mark order as served
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
      responses:
        '200':
          description: Order marked as served

  # ── ORDER DETAILS ─────────────────────────────────────────────────────────

  /branches/{branchId}/orders/{orderId}/items:
    get:
      tags:
        - Order Details
      summary: Get order items
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
      responses:
        '200':
          description: Order items retrieved successfully

    post:
      tags:
        - Order Details
      summary: Add item to order
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderDetailRequestDTO'
      responses:
        '201':
          description: Item added successfully

  /branches/{branchId}/orders/{orderId}/items/{productId}:
    get:
      tags:
        - Order Details
      summary: Get order item by product
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
        - $ref: '#/components/parameters/productId'
      responses:
        '200':
          description: Item found

    put:
      tags:
        - Order Details
      summary: Update order item
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
        - $ref: '#/components/parameters/productId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderDetailUpdateDTO'
      responses:
        '200':
          description: Item updated successfully

    delete:
      tags:
        - Order Details
      summary: Delete order item
      parameters:
        - $ref: '#/components/parameters/branchId'
        - $ref: '#/components/parameters/orderId'
        - $ref: '#/components/parameters/productId'
      responses:
        '204':
          description: Item deleted successfully

  # ── PAYMENT METHODS ───────────────────────────────────────────────────────── 

  /payment-methods:
    get:
      tags:
        - Payment Methods
      summary: Get all payment methods
      responses:
        '200':
          description: Payment methods retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentMethodResponseDTO'

    post:
      tags:
        - Payment Methods
      summary: Create payment method
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentMethodRequestDTO'
      responses:
        '201':
          description: Payment method created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethodResponseDTO'

  /payment-methods/{paymentMethodId}:
    get:
      tags:
        - Payment Methods
      summary: Get payment method by ID
      parameters:
        - $ref: '#/components/parameters/paymentMethodId'
      responses:
        '200':
          description: Payment method found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethodResponseDTO'

    put:
      tags:
        - Payment Methods
      summary: Update payment method
      parameters:
        - $ref: '#/components/parameters/paymentMethodId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentMethodRequestDTO'
      responses:
        '200':
          description: Payment method updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethodResponseDTO'

    delete:
      tags:
        - Payment Methods
      summary: Delete payment method
      parameters:
        - $ref: '#/components/parameters/paymentMethodId'
      responses:
        '204':
          description: Payment method deleted successfully

  /payment-methods/name/{name}:
    get:
      tags:
        - Payment Methods
      summary: Search payment methods by name
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment methods found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentMethodResponseDTO'             

