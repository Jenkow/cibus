# ── COMPONENTS ──────────────────────────────────────────────────────────────

components:

  parameters:
    branchId:
      name: branchId
      in: path
      required: true
      description: ID de la sucursal
      schema:
        type: integer
        example: 1

    userId:
      name: userId
      in: path
      required: true
      description: ID del usuario
      schema:
        type: integer
        example: 5

    productId:
      name: productId
      in: path
      required: true
      description: ID del producto
      schema:
        type: integer
        example: 10

    productCategoryId:
      name: productCategoryId
      in: path
      required: true
      description: Product category ID
      schema:
        type: integer
        format: int64
        example: 1    

    tableId:
      name: tableId
      in: path
      required: true
      description: ID de la mesa
      schema:
        type: integer
        example: 3

    orderId:
      name: orderId
      in: path
      required: true
      description: ID del pedido
      schema:
        type: integer
        example: 7

    detailId:
      name: detailId
      in: path
      required: true
      description: ID del detalle del pedido
      schema:
        type: integer
        example: 7

    paymentMethodId:
      name: paymentMethodId
      in: path
      required: true
      description: Payment method ID
      schema:
        type: integer
        format: int64
        example: 1    

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT    

  schemas:

    # ── AUTH ────────────────────────────────────────────────────────────────

    AuthRequest:
      type: object
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin123
      required:
        - username
        - password

    AuthResponse:
      type: object
      properties:
        AccessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...

    RefreshTokenRequest:
      type: object
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiJ9...
      required:
        - refreshToken

    # ── BRANCH ──────────────────────────────────────────────────────────────

    BranchRequestDTO:
      type: object
      properties:
        name:
          type: string
          example: "Sucursal Centro"
        street:
          type: string
          example: "San Martín"
        number:
          type: integer
          example: 1234
      required:
        - name
        - street
        - number

    BranchResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Sucursal Centro"
        street:
          type: string
          example: "San Martín"
        number:
          type: integer
          example: 1234

    # ── PRODUCT ─────────────────────────────────────────────────────────────

    ProductRequestDTO:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          example: "Milanesa Napolitana"
        description:
          type: string
          maxLength: 255
          example: "Breaded beef with tomato sauce and mozzarella cheese"
        categoryId:
          type: integer
          format: int64
          example: 2
      required:
        - name
        - categoryId

    ProductResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Milanesa Napolitana"
        description:
          type: string
          example: "Breaded beef with tomato sauce and mozzarella cheese"
        categoryName:
          type: string
          example: "Main Course"

  # ── PRODUCT CATEGORY ──────────────────────────────────────────────────────────────

    ProductCategoryRequestDTO:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          example: "Main Course"
      required:
        - name

    ProductCategoryResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Main Course"

  # ── BRANCH PRODUCTS ──────────────────────────────────────────────────────────────

    BranchProductRequestDTO:
      type: object
      properties:
        productId:
          type: integer
          format: int64
          example: 5
        price:
          type: number
          format: decimal
          example: 2500.00
      required:
        - productId
        - price

    BranchProductUpdateDTO:
      type: object
      properties:
        price:
          type: number
          format: decimal
          example: 2800.00
        available:
          type: boolean
          example: true

    BranchProductResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        available:
          type: boolean
          example: true
        price:
          type: number
          format: decimal
          example: 2500.00
        branchId:
          type: integer
          format: int64
          example: 1
        branchName:
          type: string
          example: "Sucursal Centro"
        productId:
          type: integer
          format: int64
          example: 5
        productName:
          type: string
          example: "Milanesa Napolitana"

  # ── USER ────────────────────────────────────────────────────────────────

    UserRequestDTO:
      type: object
      properties:
        dni:
          type: integer
          format: int64
          example: 40123456
        firstName:
          type: string
          example: "Juan"
        lastName:
          type: string
          example: "Pérez"
        phoneNumber:
          type: string
          example: "+5492235551234"
        email:
          type: string
          format: email
          example: "juan.perez@example.com"
        branchId:
          type: integer
          format: int64
          example: 1
        role:
          type: string
          example: "WAITER"
        pin:
          type: string
          example: "1234"
      required:
        - dni
        - firstName
        - lastName
        - phoneNumber
        - email
        - role
        - pin

    UserUpdateDTO:
      type: object
      properties:
        dni:
          type: integer
          format: int64
          example: 40123456
        firstName:
          type: string
          example: "Juan"
        lastName:
          type: string
          example: "Pérez"
        phoneNumber:
          type: string
          example: "+5492235551234"
        email:
          type: string
          format: email
          example: "juan.perez@example.com"
        branchId:
          type: integer
          format: int64
          example: 1
  
    UserResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        dni:
          type: integer
          format: int64
          example: 40123456
        firstName:
          type: string
          example: "Juan"
        lastName:
          type: string
          example: "Pérez"
        phoneNumber:
          type: string
          example: "+5492235551234"
        email:
          type: string
          format: email
          example: "juan.perez@example.com"
        branchId:
          type: integer
          format: int64
          example: 1
        branchName:
          type: string
          example: "Sucursal Centro"
        role:
          type: string
          example: "WAITER"

    ChangePasswordRequestDTO:
      type: object
      properties:
        currentPassword:
          type: string
          example: "oldPassword123"
        newPassword:
          type: string
          example: "newPassword456"
      required:
        - currentPassword
        - newPassword
    ChangeRoleDTO:
      type: object
      properties:
        roleName:
          type: string
          example: "MANAGER"
        newPin:
          type: string
          example: "4321"
      required:
        - roleName
    ResetPinRequestDTO:
      type: object
      properties:
        newPin:
          type: string
          example: "1234"
      required:
        - newPin

    # ── TABLE ────────────────────────────────────────────────────────────────

    TableCreateDTO:
      type: object
      properties:
        number:
          type: integer
          example: 12
        capacity:
          type: integer
          example: 4
      required:
        - number
        - capacity

    TableUpdateDTO:
      type: object
      properties:
        number:
          type: integer
          example: 15
        capacity:
          type: integer
          example: 6
        waiterId:
          type: integer
          format: int64
          example: 8

    TableResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        number:
          type: integer
          example: 12
        capacity:
          type: integer
          example: 4
        available:
          type: boolean
          example: true
        waiterId:
          type: integer
          format: int64
          nullable: true
          example: 8
        branchId:
          type: integer
          format: int64
          example: 1

    # ── ORDER ────────────────────────────────────────────────────────────────

    OrderRequestDTO:
      type: object
      properties:
        tableNumber:
          type: integer
          example: 12
        waiterId:
          type: integer
          format: int64
          example: 5
      required:
        - tableNumber
        - waiterId

    OrderUpdateDTO:
      type: object
      properties:
        tableNumber:
          type: integer
          example: 15

    OrderResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        branchId:
          type: integer
          format: int64
          example: 1
        branchName:
          type: string
          example: "Sucursal Centro"
        tableNumber:
          type: integer
          example: 12
        waiterId:
          type: integer
          format: int64
          example: 5
        waiterFirstName:
          type: string
          example: "Juan"
        waiterLastName:
          type: string
          example: "Pérez"
        status:
          type: string
          example: "OPEN"
        createdAt:
          type: string
          format: date-time
          example: "2026-06-15T20:30:00-03:00"
        closedAt:
          type: string
          format: date-time
          nullable: true
          example: "2026-06-15T20:30:00-03:00"
        subtotal:
          type: number
          format: double
          example: 12000.50
        discount:
          type: number
          format: double
          example: 1000.00
        finalTotal:
          type: number
          format: double
          example: 11000.50
        remainingAmount:
          type: number
          format: double
          example: 3000.00
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderDetailResponseDTO'

    OrderStatusDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "OPEN"

    PaymentDTO:
      type: object
      properties:
        paymentMethodId:
          type: integer
          format: int64
          example: 2
        amount:
          type: number
          format: double
          example: 5000.00
      required:
        - paymentMethodId
        - amount

    DiscountRequestDTO:
      type: object
      properties:
        amount:
          type: number
          format: double
          example: 1500.00
      required:
        - amount

    # ── ORDER DETAIL ─────────────────────────────────────────────────────────

    OrderDetailRequestDTO:
      type: object
      properties:
        productId:
          type: integer
          format: int64
          example: 5
        observation:
          type: string
          example: "Without onions"
        quantity:
          type: integer
          example: 2
      required:
        - productId
        - quantity

    OrderDetailUpdateDTO:
      type: object
      properties:
        observation:
          type: string
          example: "Extra cheese"
        quantity:
          type: integer
          example: 3

    OrderDetailResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        productId:
          type: integer
          format: int64
          example: 5
        productName:
          type: string
          example: "Milanesa Napolitana"
        quantity:
          type: integer
          example: 2
        unitPrice:
          type: number
          format: double
          example: 2500.00
        subtotal:
          type: number
          format: double
          example: 5000.00
        observation:
          type: string
          example: "Without onions"

    # ── PAYMENT METHODS ────────────────────────────────────────────────────────────────      
    PaymentMethodRequestDTO:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
          example: "Credit Card"
      required:
        - name

    PaymentMethodResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: "Credit Card"

    # ── STATISTICS ──────────────────────────────────────────────────────────────── 

    OverviewInsightDTO:
      type: object
      properties:
        totalRevenue:
          type: number
          format: double
          example: 1250000.50
        totalOrders:
          type: integer
          format: int64
          example: 320
        occupancyRate:
          type: number
          format: double
          example: 82.5
        mostPopularProduct:
          $ref: '#/components/schemas/ProductMetricDTO'
        mostPopularCategory:
          $ref: '#/components/schemas/ProductCategoryMetricDTO'
        bestWaiter:
          $ref: '#/components/schemas/WaiterMetricDTO'

    TableInsightDTO:
      type: object
      properties:
        mostBusyTable:
          $ref: '#/components/schemas/TableMetricDTO'
        lessBusyTable:
          $ref: '#/components/schemas/TableMetricDTO'
        occupancyRate:
          type: number
          format: double
          example: 78.4

    ProductInsightDTO:
      type: object
      properties:
        mostPopularProduct:
          $ref: '#/components/schemas/ProductMetricDTO'
        lessPopularProduct:
          $ref: '#/components/schemas/ProductMetricDTO'
        mostExpensiveProduct:
          $ref: '#/components/schemas/ProductMetricDTO'
        cheapestProduct:
          $ref: '#/components/schemas/ProductMetricDTO'
        mostPopularCategory:
          $ref: '#/components/schemas/ProductCategoryMetricDTO'
        lessPopularCategory:
          $ref: '#/components/schemas/ProductCategoryMetricDTO'

    OrderInsightDTO:
      type: object
      properties:
        totalRevenue:
          type: number
          format: double
          example: 1250000.50
        averageTicket:
          type: number
          format: double
          example: 4200.75
        averageRevenuePerDay:
          type: number
          format: double
          example: 87500.20
        highestValueOrder:
          $ref: '#/components/schemas/OrderMetricDTO'
        lowestValueOrder:
          $ref: '#/components/schemas/OrderMetricDTO'
        totalOrders:
          type: integer
          format: int64
          example: 320

    WaiterInsightDTO:
      type: object
      properties:
        facturationRanking:
          type: array
          items:
            $ref: '#/components/schemas/WaiterMetricDTO'
        ordersQuantityRanking:
          type: array
          items:
            $ref: '#/components/schemas/WaiterMetricDTO'
        averageOrdersPerWaiter:
          type: number
          format: double
          example: 35.7

    ProductMetricDTO:
      type: object
      properties:
        productId:
          type: integer
          format: int64
          example: 5
        productName:
          type: string
          example: "Milanesa Napolitana"
        productPrice:
          type: number
          format: double
          example: 4500.00
        timesSold:
          type: integer
          format: int64
          example: 350

    ProductCategoryMetricDTO:
      type: object
      properties:
        name:
          type: string
          example: "Main Course"
        timesSold:
          type: integer
          format: int64
          example: 1200

    WaiterMetricDTO:
      type: object
      properties:
        dni:
          type: integer
          format: int64
          example: 40123456
        firstName:
          type: string
          example: "Juan"
        lastName:
          type: string
          example: "Pérez"
        branchName:
          type: string
          example: "Sucursal Centro"
        facturation:
          type: number
          format: double
          example: 1542300.50
        ordersServed:
          type: integer
          format: int64
          example: 387

    TableMetricDTO:
      type: object
      properties:
        number:
          type: integer
          example: 12
        orderCount:
          type: integer
          format: int64
          example: 185

    OrderMetricDTO:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
          example: 42
        branchId:
          type: integer
          format: int64
          example: 1
        tableId:
          type: integer
          format: int64
          example: 7
        waiterName:
          type: string
          example: "Juan Pérez"
        ticketValue:
          type: number
          format: double
          example: 15250.75
        orderDate:
          type: string
          format: date-time
          example: "2026-06-15T20:30:00-03:00"

    # ── ERROR ────────────────────────────────────────────────────────────────

    Error:
      type: object
      properties:
        status:
          type: integer
          example: 404
        message:
          type: string
          example: "Recurso no encontrado"
        timestamp:
          type: string
          format: date-time
          example: "2026-06-15T20:30:00-03:00"
